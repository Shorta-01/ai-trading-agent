name: CI Diagnostic

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Start diagnostic
        run: |
          echo "CI diagnostic started"
          echo "Runner OS: $RUNNER_OS"
          echo "GitHub event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect repository
        run: |
          pwd
          ls -la
          git status --short
          test -f .github/workflows/ci.yml
          echo "Repository checkout succeeded"

      - name: Check tool versions
        run: |
          python3 --version
          node --version
          npm --version
          git --version

      - name: Write diagnostic artifact
        run: |
          mkdir -p diagnostic-output
          {
            echo "CI diagnostic completed"
            date -u
            echo "Runner OS: $RUNNER_OS"
            echo "Ref: $GITHUB_REF"
            echo "SHA: $GITHUB_SHA"
            python3 --version
            node --version
            npm --version
            git --version
          } > diagnostic-output/ci-diagnostic.txt

      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostic-output
          path: diagnostic-output/ci-diagnostic.txt
