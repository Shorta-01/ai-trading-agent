name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  domain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/domain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest -q
  portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd packages/domain && pip install -e .
      - run: cd packages/portfolio && pip install -e .[dev]
      - run: cd packages/portfolio && ruff check .
      - run: cd packages/portfolio && mypy src
      - run: cd packages/portfolio && pytest -q

  storage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest -q

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd ../../packages/domain && pip install -e .
      - run: cd ../../packages/storage && pip install -e .
      - run: cd ../../packages/portfolio && pip install -e .
      # Task 133: the api consumes the worker's pure-function Action
      # Draft composer (no network/IO). Pre-install editable so pip
      # sees the local package and skips a PyPI lookup that would 404.
      - run: cd ../../apps/worker && pip install -e .
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd ../../packages/storage && pip install -e .
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # Task 126b: Playwright smoke. Install chromium only to keep CI fast.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
