name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  domain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/domain
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 10s before attempt 2
        if: steps.checkout1.outcome == 'failure'
        working-directory: .
        run: sleep 10
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 30s before attempt 3
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        working-directory: .
        run: sleep 30
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        id: checkout3
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 60s before attempt 4
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        working-directory: .
        run: sleep 60
      - name: Checkout (attempt 4)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest -q
  portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 10s before attempt 2
        if: steps.checkout1.outcome == 'failure'
        working-directory: .
        run: sleep 10
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 30s before attempt 3
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        working-directory: .
        run: sleep 30
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        id: checkout3
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 60s before attempt 4
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        working-directory: .
        run: sleep 60
      - name: Checkout (attempt 4)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd packages/domain && pip install -e .
      - run: cd packages/portfolio && pip install -e .[dev]
      - run: cd packages/portfolio && ruff check .
      - run: cd packages/portfolio && mypy src
      - run: cd packages/portfolio && pytest -q

  storage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/storage
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 10s before attempt 2
        if: steps.checkout1.outcome == 'failure'
        working-directory: .
        run: sleep 10
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 30s before attempt 3
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        working-directory: .
        run: sleep 30
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        id: checkout3
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 60s before attempt 4
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        working-directory: .
        run: sleep 60
      - name: Checkout (attempt 4)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest -q

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 10s before attempt 2
        if: steps.checkout1.outcome == 'failure'
        working-directory: .
        run: sleep 10
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 30s before attempt 3
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        working-directory: .
        run: sleep 30
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        id: checkout3
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 60s before attempt 4
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        working-directory: .
        run: sleep 60
      - name: Checkout (attempt 4)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd ../../packages/domain && pip install -e .
      - run: cd ../../packages/storage && pip install -e .
      - run: cd ../../packages/portfolio && pip install -e .
      # Task 133: the api consumes the worker's pure-function Action
      # Draft composer (no network/IO). Pre-install editable so pip
      # sees the local package and skips a PyPI lookup that would 404.
      - run: cd ../../apps/worker && pip install -e .
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest
      # GAPS.md P2-8 contract drift detection: regenerate the OpenAPI
      # snapshot and fail if it differs from what's committed. This
      # catches route signature changes that ship without an
      # ``apps/web/lib/api-types.ts`` regen.
      - name: Verify openapi.json is up-to-date
        run: |
          python scripts/export_openapi.py
          git diff --exit-code openapi.json || (
            echo "openapi.json is stale. Run apps/api/scripts/export_openapi.py and commit." && exit 1
          )

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 10s before attempt 2
        if: steps.checkout1.outcome == 'failure'
        working-directory: .
        run: sleep 10
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 30s before attempt 3
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        working-directory: .
        run: sleep 30
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        id: checkout3
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 60s before attempt 4
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        working-directory: .
        run: sleep 60
      - name: Checkout (attempt 4)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd ../../packages/domain && pip install -e .
      - run: cd ../../packages/storage && pip install -e .
      - run: cd ../../packages/portfolio && pip install -e .
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy src
      - run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 10s before attempt 2
        if: steps.checkout1.outcome == 'failure'
        working-directory: .
        run: sleep 10
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 30s before attempt 3
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        working-directory: .
        run: sleep 30
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure'
        id: checkout3
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Wait 60s before attempt 4
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        working-directory: .
        run: sleep 60
      - name: Checkout (attempt 4)
        if: steps.checkout1.outcome == 'failure' && steps.checkout2.outcome == 'failure' && steps.checkout3.outcome == 'failure'
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # GAPS.md P2-8 contract drift detection: regenerate the TypeScript
      # types and fail if they differ from what's committed. The api job
      # already verified openapi.json is fresh; this catches the case
      # where openapi.json was regen'd but api-types.ts wasn't.
      - name: Verify api-types.ts is up-to-date
        run: |
          npm run gen:api-types
          git diff --exit-code lib/api-types.ts || (
            echo "lib/api-types.ts is stale. Run apps/web/npm run gen:api-types and commit." && exit 1
          )
      # Task 126b: Playwright smoke. Install chromium only to keep CI fast.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
