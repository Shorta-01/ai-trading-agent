[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "portfolio-outlook-domain"
version = "0.1.0"
description = "Shared validated domain contracts for Portfolio Outlook Manager"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.9.0",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.11.0",
  "pytest>=8.3.0",
  "ruff>=0.6.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["portfolio_outlook_domain"]

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src"

[tool.setuptools.package-data]
portfolio_outlook_domain = ["py.typed"]
