[project]
name = "portfolio-outlook-portfolio"
version = "0.1.0"
description = "Paper accounting calculation helpers for Portfolio Outlook Manager"
requires-python = ">=3.12"
dependencies = [
  "portfolio-outlook-domain",
  # V1.1 §22.1 heavy-dep boundary relaxation. Activated by Slice 24
  # (predictor refactor base); the predictors' internals switch to
  # numpy/pandas for log-return + rolling-statistics math while the
  # Decimal money boundary at the dataclass stays unchanged.
  # statsmodels enables GARCH(1,1) volatility forecasting in the
  # rebuilt GBM (Slice 27).
  # "numpy>=2.0.0",
  # "pandas>=2.2.0",
  # "statsmodels>=0.14.0",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.11.0",
  "pytest>=8.3.0",
  "ruff>=0.6.0",
]

[tool.setuptools.package-data]
portfolio_outlook_portfolio = ["py.typed"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["portfolio_outlook_portfolio"]

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = ["portfolio_outlook_domain"]
ignore_missing_imports = true
[[tool.mypy.overrides]]
module = ["portfolio_outlook_domain.*"]
ignore_missing_imports = true
