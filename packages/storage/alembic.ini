[alembic]
script_location = alembic
prepend_sys_path = src

# Placeholder only for local migration planning.
# Must be overridden with secure environment/secret configuration later.
sqlalchemy.url = postgresql://placeholder_user:placeholder_password@localhost:5432/placeholder_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
